<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Invitación a Ximbra</title>
</head>
<body style="font-family: sans-serif; color: #1f2937; max-width: 560px; margin: 0 auto; padding: 32px 16px;">
  <h2 style="color: #4f46e5;">Has sido invitado a Ximbra</h2>
  <p><strong>{{ invited_by_email }}</strong> te ha invitado a unirte a la plataforma de alertas de tormentas eléctricas.</p>
  <p style="margin: 32px 0;">
    <a href="{{ accept_url }}"
       style="background: #4f46e5; color: #fff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 600;">
      Aceptar invitación
    </a>
  </p>
  <p style="font-size: 13px; color: #6b7280;">Este enlace expira el {{ expires_at }}.</p>
  <p style="font-size: 13px; color: #6b7280;">Si no esperabas esta invitación, puedes ignorar este correo.</p>
  <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 24px 0;">
  <p style="font-size: 12px; color: #9ca3af;">Ximbra — Sistema de Alertas de Tormentas</p>
</body>
</html>
