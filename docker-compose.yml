networks:
  app_network:
    driver: bridge
    name: ximbra_app_network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  pip_cache:
  minio_data:
  model_data:

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multitenant_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --appendfsync everysec --requirepass ${REDIS_PASSWORD:-ximbra_redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ximbra_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"

  mongodb:
    image: mongo:4.4
    volumes:
      - mongodb_data:/data/db
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "mongo --quiet --eval 'db.adminCommand(\"ping\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    volumes:
      - pip_cache:/pip-cache
    ports:
      - "${DJANGO_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-multitenant_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-ximbra_redis_secret}@redis:6379
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-ximbra_redis_secret}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-ximbra_redis_secret}@redis:6379/0
      # MinIO (S3 local)
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - AWS_STORAGE_BUCKET_NAME=${MINIO_BUCKET:-ximbra}
      - AWS_S3_ENDPOINT_URL=http://minio:9000
      - AWS_S3_REGION_NAME=us-east-1
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    command: celery -A config worker -l info
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-multitenant_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-ximbra_redis_secret}@redis:6379
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-ximbra_redis_secret}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-ximbra_redis_secret}@redis:6379/0
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    restart: unless-stopped

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-multitenant_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-ximbra_redis_secret}@redis:6379
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-ximbra_redis_secret}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-ximbra_redis_secret}@redis:6379/0
    networks:
      - app_network
    depends_on:
      - redis
      - postgres
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    restart: unless-stopped

  apiauth:
    build:
      context: ./apiauth
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    volumes:
      - ./apiauth:/app
    ports:
      - "${FASTAPI_PORT:-8001}:8001"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=${POSTGRES_DB:-multitenant_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-ximbra_redis_secret}@redis:6379
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    restart: unless-stopped

  watchdog:
    build:
      context: ./watchdog
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-ximbra_redis_secret}@redis:6379
    networks:
      - app_network
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"    # S3 API (boto3 apunta aquí)
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Consola web
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    restart: unless-stopped

  # Crea el bucket por defecto al levantar el stack
  minio_init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app_network
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/${MINIO_BUCKET:-ximbra} &&
        mc anonymous set download local/${MINIO_BUCKET:-ximbra}/public &&
        echo 'MinIO bucket listo.'
      "
    restart: "no"

  telegram_bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
    environment:
      - DB_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-multitenant_db}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - MIN_CYCLE_INTERVAL_SEC=${TELEGRAM_NOTIFIER_CYCLE_SEC:-300}
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  predictor:
    build:
      context: ./predictor
      dockerfile: Dockerfile
    environment:
      - DB_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-multitenant_db}
      - MIN_CYCLE_INTERVAL_SEC=${PREDICTOR_CYCLE_SEC:-3600}
    volumes:
      - model_data:/models
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  trainer:
    build:
      context: ./trainer
      dockerfile: Dockerfile
    environment:
      - DB_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-multitenant_db}
      - MODEL_PATH=/models
    volumes:
      - model_data:/models
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    restart: "no"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    environment:
      - DB_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-multitenant_db}
      - MIN_CYCLE_INTERVAL_SEC=${INGESTOR_CYCLE_SEC:-3600}
    networks:
      - app_network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.25"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  vue:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_APP_NAME: Ximbra
        VITE_API_BASE_URL: http://18.189.230.171:8000
    ports:
      - "${VUE_PORT:-80}:80"
    networks:
      - app_network
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    restart: unless-stopped
